<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mancini Lab | Contact Us</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="nav-placeholder"></div>
    
    <div class="container">
        <h1>Contact Us</h1>
        <div class="main-layout">
            <main>
                <h3>Email</h3>
                <p>Primary Contact: <a href="mailto:MancinR@miamioh.edu">MancinR@miamioh.edu</a></p>

                <br>

                <h3>Mailing Address</h3>
                <p>
                    <strong>Mancini Group</strong><br>
                    254 Hughes Laboratories<br>
                    Miami University<br>
                    Oxford, Ohio 45056
                </p>
            </main>

            <aside>
                <h3>Visit Us</h3>
                <div style="width: 100%; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; line-height: 0;">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3084.711867160751!2d-84.73541452349544!3d39.50953681024621!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x88403d157a3e8957%3A0x633513a96756816a!2sHughes%20Laboratories!5e0!3m2!1sen!2sus!4v1710000000000!5m2!1sen!2sus" 
                        width="100%" 
                        height="300" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
                <p style="font-size: 0.9rem; color: #666; margin-top: 10px; text-align: center;">
                    <a href="https://maps.app.goo.gl/vS6pY68m2kQy9rW4A" target="_blank" style="color: #a6192e;">Open in Google Maps</a>
                </p>
            </aside>
        </div>
    </div>

    <footer class="site-footer">
        <p>&copy; 2026 The Mancini Group</p>
    </footer>

    <script>
        fetch('nav.html?v=' + Date.now()) 
            .then(response => {
                if (!response.ok) {
                    throw new Error("HTTP error! Status: " + response.status);
                }
                return response.text();
            })
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Fetch error:', error);
                document.getElementById('nav-placeholder').innerHTML = 
                    '<nav><a href="index.html">Home</a> | <a href="contact.html">Contact</a></nav>';
            });
    </script>
</body>
</html>
