<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mancini Lab | Research</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="container">
        <div class="main-layout">
            <main>
                <h1>Research Overview</h1>
                <h3>Immune Modulation via Synthetic Chemistry</h3>
                <p>We develop synthetic tools to better understand and manipulate immune responses.</p>
                
                </main>

            <aside>
                <h3>Current Projects</h3>
                <ul>
                    <li>Metabolic Intermediates</li>
                    <li>Pro-immunostimulants</li>
                </ul>
            </aside>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 The Mancini Group | WSU</p>
    </footer>

    <script>
        fetch('nav.html?v=' + Date.now()) 
            .then(response => {
                if (!response.ok) {
                    throw new Error("HTTP error! Status: " + response.status);
                }
                return response.text();
            })
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                console.log("Navigation loaded successfully.");
            })
            .catch(error => {
                console.error('Fetch error:', error);
                document.getElementById('nav-placeholder').innerHTML = 
                    '<nav><a href="index.html">Home</a> | <a href="research.html">Research</a></nav>';
            });
    </script>
</body>
</html>
